version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: intent_user
      POSTGRES_PASSWORD: intent_pass
      POSTGRES_DB: intent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intent_user -d intent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
